name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install npm dependencies
        run: npm install
      - name: Install Android SDK build tools
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties
      - name: Make gradlew executable
        run: chmod +x android/gradlew
      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anthorvia-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
